name: Deploy orchestration

on:
  push:
    branches: [main]
    paths:
      - ingestion/**
      - orchestration/**
      - pyproject.toml
      - uv.lock
      - .github/workflows/deploy-orchestration.yml
      - .github/workflows/_deploy-orchestration.yml

permissions:
  id-token: write
  contents: read

jobs:

  # Merge to main → deploy dev (the only env in this account today).
  # When the prod AWS account is added, a release event will deploy to prod.
  deploy:
    uses: ./.github/workflows/_deploy-orchestration.yml
    with:
      environment: dev
    secrets: inherit
