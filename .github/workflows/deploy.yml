name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:

  # Merge to main → deploy dev (the only env in this account today).
  # When the prod AWS account is added, a release event will deploy to prod.
  deploy-infrastructure:
    uses: ./.github/workflows/_deploy-infrastructure.yml
    with:
      environment: dev
    secrets: inherit

  deploy-runner:
    needs: deploy-infrastructure
    uses: ./.github/workflows/_deploy-runner.yml
    with:
      environment: dev
    secrets: inherit
