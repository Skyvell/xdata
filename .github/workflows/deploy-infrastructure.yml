name: Deploy infrastructure

on:
  push:
    branches: [main]
    paths: [infra/**]

permissions:
  id-token: write
  contents: read

jobs:

  # Merge to main → deploy dev (the only env in this account today).
  # When the prod AWS account is added, a release event will deploy to prod.
  deploy:
    uses: ./.github/workflows/_deploy-infrastructure.yml
    with:
      environment: dev
    secrets: inherit
